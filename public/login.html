<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — KFC Delivery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    </head>
<body>
    <header>
        <div class="logo">KFC Delivery</div>
        <nav>
            <a href="index.html">Back to Menu</a>
        </nav>
    </header>

    <main class="auth-container">
        <!-- Login Form -->
        <div class="auth-box" id="login-box">
            <span class="auth-logo">KFC Delivery</span>
            <h2>Welcome back</h2>
            <p class="auth-subtitle">Sign in to your account to continue ordering.</p>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email address" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="primary-btn">Sign In</button>
            </form>
            <p>Don't have an account? <a href="#" onclick="toggleAuth()">Create one</a></p>
        </div>

        <!-- Register Form -->
        <div class="auth-box" id="register-box" style="display: none;">
            <span class="auth-logo">KFC Delivery</span>
            <h2>Create account</h2>
            <p class="auth-subtitle">Join us and get your favourite meals delivered.</p>
            <form id="register-form">
                <input type="text" id="reg-fname" placeholder="First name" required>
                <input type="text" id="reg-lname" placeholder="Last name" required>
                <input type="text" id="reg-phone" placeholder="Phone number" required>
                <input type="email" id="reg-email" placeholder="Email address" required>
                <input type="password" id="reg-password" placeholder="Password" required>
                <button type="submit" class="primary-btn">Create Account</button>
            </form>
            <p>Already have an account? <a href="#" onclick="toggleAuth()">Sign in</a></p>
        </div>
    </main>

    <script src="utils.js"></script>
    <script src="login.js"></script>
</body>
</html>
