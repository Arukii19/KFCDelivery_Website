<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard - KFC Delivery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .tab-btn {
            background-color: #eee;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: var(--kfc-red);
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🏍️ Driver Dashboard</div>
        <nav>
            <span id="rider-greeting" style="font-weight: 600; margin-right: 1rem;">Welcome!</span>
            <button onclick="logoutRider()" class="primary-btn" style="background-color: #333; padding: 0.5rem 1rem;">Log Out</button>
        </nav>
    </header>

    <main class="admin-container">
        <!-- Status Control -->
        <div class="auth-box" style="margin-bottom: 2rem; max-width: 500px; padding: 1.5rem;">
            <h3 style="margin-top: 0;">My Status</h3>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <select id="my-status" style="flex: 1; padding: 0.8rem; border-radius: 6px; border: 1px solid #ccc; font-family: inherit;">
                    <option value="Available">🟢 Available</option>
                    <option value="Busy">🟡 Busy</option>
                    <option value="Offline">🔴 Offline</option>
                </select>
                <button onclick="updateMyStatus()" class="primary-btn" style="padding: 0.8rem 1.5rem;">Update</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" id="tab-active" onclick="switchTab('active')">Active Deliveries</button>
            <button class="tab-btn" id="tab-history" onclick="switchTab('history')">Delivery History</button>
        </div>

        <!-- Active Deliveries -->
        <section id="active-box">
            <div id="rider-active-container" class="menu-grid">
                <p style="text-align: center; color: #666; grid-column: 1 / -1;">Loading your deliveries...</p>
            </div>
        </section>

        <!-- Delivery History -->
        <section id="history-box" style="display: none;">
            <div id="rider-history-container" class="menu-grid">
                <p style="text-align: center; color: #666; grid-column: 1 / -1;">Loading history...</p>
            </div>
        </section>
    </main>

    <script src="utils.js"></script>
    <script src="rider.js"></script>
</body>
</html>
