<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - KFC Delivery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    </head>
<body>
    <header>
        <div class="logo">KFC Delivery</div>
        <nav>
            <a href="index.html">Home</a>
        </nav>
    </header>

    <main class="auth-container">
        <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                <button id="tab-profile" class="category-btn active" onclick="switchTab('profile')">My Profile</button>
                <button id="tab-orders" class="category-btn" onclick="switchTab('orders')">My Orders</button>
            </div>

            <div class="auth-box" id="profile-box" style="max-width: 500px; width: 100%;">
                <h2>Profile Details</h2>
                <form id="profile-form">
                    <div style="text-align: left; margin-bottom: 0.5rem;"><label>First Name</label></div>
                    <input type="text" id="prof-fname" placeholder="First Name" required>
                                    <div style="text-align: left; margin-bottom: 0.5rem;"><label>Last Name</label></div>
                    <input type="text" id="prof-lname" placeholder="Last Name" required>
                                    <div style="text-align: left; margin-bottom: 0.5rem;"><label>Phone Number</label></div>
                    <input type="text" id="prof-phone" placeholder="Phone Number" required>
                                    <div style="text-align: left; margin-bottom: 0.5rem;"><label>Email Address</label></div>
                    <input type="email" id="prof-email" placeholder="Email Address" required>
                                    <button type="submit" class="primary-btn" style="margin-bottom: 1rem;">Save Changes</button>
                </form>
                <button onclick="logoutUser()" class="primary-btn" style="background-color: #333;">Logout</button>
            </div>

            <div class="auth-box" id="my-orders-box" style="max-width: 600px; width: 100%; display: none;">
                <h2 style="margin-bottom: 1.5rem;">My Orders</h2>
                <div id="customer-orders-container" class="menu-grid" style="grid-template-columns: 1fr; gap: 1rem;">
                    <!-- Customer orders will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <script src="utils.js"></script>
    <script src="profile.js"></script>
</body>
</html>
