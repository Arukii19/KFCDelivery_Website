<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFC Online Delivery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">🍗 KFC Delivery</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="#" id="cart-link">Cart (<span id="cart-count">0</span>)</a>
            <a href="login.html" id="auth-link">Login/Register</a>
            <a href="rider-login.html" style="color: #ccc; font-size: 0.85rem; margin-left: 1rem;">Rider Portal</a>
        </nav>
    </header>
    
    <main>
        <section class="hero">
            <h2>Finger Lickin' Good</h2>
            <p>Order your favorite meals now and get them delivered hot and fresh!</p>
        </section>

        <section class="menu-section">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--kfc-red); margin-bottom: 1.5rem; padding-bottom: 0.5rem; flex-wrap: wrap; gap: 1rem;">
                <h2 style="border: none; margin: 0; padding: 0;">Available Menu Items</h2>
                <input type="text" id="search-input" placeholder="Search menu..." style="padding: 0.6rem; border-radius: 6px; border: 1px solid #ccc; width: 100%; max-width: 300px; font-family: inherit; font-size: 1rem;">
            </div>
            
            <div id="category-filters" style="margin-bottom: 2rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <!-- Category buttons injected by JS -->
            </div>

            <div id="menu-container" class="menu-grid">
                <!-- Menu items will be injected here by JavaScript -->
                <p>Loading menu...</p>
            </div>
        </section>
    </main>

    <!-- Cart Modal -->
    <div id="cart-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Your Cart</h2>
            <div id="cart-items"></div>
            <div class="payment-method-container" style="margin-top: 1rem; margin-bottom: 0.5rem;">
                <label for="branch-select"><strong>Select Branch:</strong></label>
                <select id="branch-select" style="padding: 0.5rem; margin-left: 0.5rem; border-radius: 4px; width: 100%; margin-top: 0.25rem;">
                    <option value="">Loading branches...</option>
                </select>
            </div>
            <div class="payment-method-container" style="margin-bottom: 0.5rem;">
                <label for="payment-method"><strong>Payment Method:</strong></label>
                <select id="payment-method" style="padding: 0.5rem; margin-left: 0.5rem; border-radius: 4px; width: 100%; margin-top: 0.25rem;">
                    <option value="Cash">Cash on Delivery</option>
                    <option value="GCash">GCash</option>
                </select>
            </div>
            <div class="cart-total">Total: ₱<span id="cart-total-price">0.00</span></div>
            <button id="checkout-btn" class="primary-btn">Checkout</button>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="app.js"></script>
</body>
</html>
