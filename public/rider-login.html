<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Portal — KFC Delivery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    </head>
<body>
    <header>
        <div class="logo">KFC Delivery</div>
        <nav>
            <a href="index.html">Back to Menu</a>
        </nav>
    </header>

    <main class="auth-container">
        <!-- Login Form -->
        <div class="auth-box" id="login-box">
            <span class="auth-logo">Rider Portal</span>
            <h2>Rider Sign In</h2>
            <p class="auth-subtitle">Access your delivery dashboard.</p>
            <form id="rider-login-form">
                <input type="email" id="login-email" placeholder="Email address" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="primary-btn">Sign In</button>
            </form>
            <p>New rider? <a href="#" onclick="toggleAuth()">Apply here</a></p>
        </div>

        <!-- Register Form -->
        <div class="auth-box" id="register-box" style="display: none;">
            <span class="auth-logo">Rider Portal</span>
            <h2>Rider Application</h2>
            <p class="auth-subtitle">Join the KFC delivery team.</p>
            <form id="rider-register-form">
                <input type="text" id="reg-fname" placeholder="First name" required>
                <input type="text" id="reg-lname" placeholder="Last name" required>
                <input type="email" id="reg-email" placeholder="Email address" required>
                <input type="text" id="reg-phone" placeholder="Phone number" required>
                <select id="reg-vehicle" required>
                    <option value="" disabled selected>Select vehicle type</option>
                    <option value="Motorcycle">Motorcycle</option>
                    <option value="Bicycle">Bicycle</option>
                    <option value="E-Bike">E-Bike</option>
                    <option value="Car">Car</option>
                    <option value="Van">Van</option>
                </select>
                <input type="password" id="reg-password" placeholder="Password" required>
                <button type="submit" class="primary-btn">Submit Application</button>
            </form>
            <p>Already approved? <a href="#" onclick="toggleAuth()">Sign in</a></p>
        </div>
    </main>

    <script src="utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('riderSession')) {
                window.location.href = 'rider-dashboard.html';
            }
        });

        function toggleAuth() {
            const loginBox = document.getElementById('login-box');
            const registerBox = document.getElementById('register-box');
            if (loginBox.style.display === 'none') {
                loginBox.style.display = 'block';
                registerBox.style.display = 'none';
            } else {
                loginBox.style.display = 'none';
                registerBox.style.display = 'block';
            }
        }

        // Login Submit
        document.getElementById('rider-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch('http://localhost:3000/api/rider/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    if(typeof showNotification === 'function') showNotification('Welcome back, ' + data.rider.Ridr_FName);
                    localStorage.setItem('riderSession', JSON.stringify(data.rider));
                    setTimeout(() => window.location.href = 'rider-dashboard.html', 1500);
                } else {
                    if(typeof showNotification === 'function') showNotification('Error: ' + data.error, true);
                }
            } catch (err) {
                console.error(err);
                if(typeof showNotification === 'function') showNotification('Failed to connect to server', true);
            }
        });

        // Register Submit
        document.getElementById('rider-register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                fName: document.getElementById('reg-fname').value,
                lName: document.getElementById('reg-lname').value,
                email: document.getElementById('reg-email').value,
                phone: document.getElementById('reg-phone').value,
                vehicle: document.getElementById('reg-vehicle').value,
                password: document.getElementById('reg-password').value
            };
            try {
                const res = await fetch('http://localhost:3000/api/rider/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    if(typeof showNotification === 'function') showNotification('Registration successful! Please login.');
                    setTimeout(() => toggleAuth(), 1500);
                } else {
                    if(typeof showNotification === 'function') showNotification('Error: ' + data.error, true);
                }
            } catch (err) {
                console.error(err);
                if(typeof showNotification === 'function') showNotification('Failed to connect to server', true);
            }
        });
    </script>
</body>
</html>
